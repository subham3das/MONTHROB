<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | monthrob.in</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />

    <style>
      :root {
        --beige: #F5F5F0;
        --black: #0F0F0F;
        --white: #FFFFFF;
        --gray: #F9F9F9;
        --sage: #7B8C7C;
        --border-color: #E2E2E2;
        --transition: 0.3s ease;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Outfit", sans-serif;
        background-color: var(--white);
        color: var(--black);
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .auth-container {
        width: 100%;
        max-width: 400px;
        text-align: center;
      }

      .auth-card {
        background: var(--beige);
        border: 1.5px solid var(--border-color);
        border-radius: 24px;
        padding: 40px 30px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.03);
      }

      .icon-box {
        width: 60px;
        height: 60px;
        background: var(--white);
        border: 1px solid var(--border-color);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 20px;
        font-size: 30px;
      }

      .auth-card h2 {
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 10px;
      }

      .subtitle {
        font-size: 14px;
        color: #777;
        margin-bottom: 30px;
        line-height: 1.5;
      }

      .form-group {
        margin-bottom: 25px;
        text-align: left;
      }

      .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 8px;
        color: #888;
      }

      .form-group input {
        width: 100%;
        padding: 14px 20px;
        background: var(--white);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        font-size: 15px;
        font-family: inherit;
        outline: none;
      }

      .btn-primary {
        width: 100%;
        padding: 16px;
        background: var(--black);
        color: var(--white);
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s, opacity 0.2s;
      }

      .btn-primary:hover {
        opacity: 0.9;
      }

      .auth-footer {
        margin-top: 30px;
        font-size: 14px;
        color: #777;
      }

      .auth-footer a {
        color: var(--black);
        font-weight: 800;
        text-decoration: none;
      }

      .success-message {
        display: none;
      }

      .success-message.active {
        display: block;
      }

      .reset-form.hidden {
        display: none;
      }

      .home-back {
        position: absolute;
        top: 30px;
        left: 30px;
        font-size: 24px;
        color: var(--black);
      }
    </style>
  </head>
  <body>
    
    <a href="login.html" class="home-back"><i class='bx bx-chevron-left'></i></a>

    <div class="auth-container">
      <div class="auth-card">
        
        <div class="reset-form" id="resetForm">
          <div class="icon-box">
            <i class='bx bx-key'></i>
          </div>
          <h2>Forgot Password?</h2>
          <p class="subtitle">Enter your email and we'll send you instructions to reset your password.</p>

          <form id="recoveryForm">
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" placeholder="name@example.com" id="emailInput" required>
            </div>
            <button type="submit" class="btn-primary">Send Recovery Link</button>
          </form>
        </div>

        <div class="success-message" id="successMsg">
          <div class="icon-box">
            <i class='bx bx-mail-send' style="color: #2e8c4a;"></i>
          </div>
          <h2>Check Your Email</h2>
          <p class="subtitle">We've sent recovery instructions to <br><b id="displayEmail">user@example.com</b></p>
          <button class="btn-primary" onclick="window.location.href='login.html'">Back to Login</button>
        </div>

      </div>

      <div class="auth-footer">
        Remembered your password? <a href="login.html">Sign In</a>
      </div>
    </div>

    <script>
      document.getElementById('recoveryForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('emailInput').value;
        document.getElementById('displayEmail').innerText = email;
        document.getElementById('resetForm').classList.add('hidden');
        document.getElementById('successMsg').classList.add('active');
      });
    </script>

  </body>
</html>
