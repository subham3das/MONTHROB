<style>
  :root {
    --navbar-height: 70px;
  }

  /* Unified Boutique Top Navbar */
  .navbar-top {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: var(--navbar-height);
    padding: 0 40px;
    display: flex;
    justify-content: space-between;
    border-bottom: 2px solid #f2f2f2;
    align-items: center;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px);
    z-index: 2000;
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    border-radius: 0 0 0 0;
  }

  /* Scrolled State */
  .navbar-top.scrolled {
    background: rgba(255, 255, 255, 0.95);
    height: 60px;
    border-bottom: 1px solid #f2f2f2;
  }

  .nav-top-left {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .nav-top-logo {
    font-weight: 900;
    font-size: 24px;
    letter-spacing: -1.5px;
    text-transform: lowercase;
    text-decoration: none;
    color: var(--black, #0F0F0F);
  }

  .nav-top-burger {
    font-size: 30px;
    width: 48px;
    height: 48px;
    cursor: pointer;
    color: var(--black, #0F0F0F);
    z-index: 3001;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease;
    border-radius: 50%;
  }

  .nav-top-burger:hover {
    background: rgba(0,0,0,0.05);
  }

  .nav-top-right {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  @media (max-width: 768px) {
    .nav-top-burger {
      display: none;
    }
  }

  /* --- PC Navigation Sidebar --- */
  .pc-sidebar-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(8px);
    z-index: 3000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .pc-sidebar-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .pc-sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 340px;
    height: 100%;
    background: #fff;
    z-index: 3100;
    transform: translateX(-100%);
    transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    display: flex;
    flex-direction: column;
    padding: 40px;
    box-shadow: 20px 0 60px rgba(0,0,0,0.05);
  }

  .pc-sidebar.active {
    transform: translateX(0);
  }

  .sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 60px;
  }

  .sidebar-logo {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: -1px;
    text-transform: lowercase;
    text-decoration: none;
    color: #000;
  }

  .close-sidebar {
    font-size: 30px;
    cursor: pointer;
    transition: transform 0.3s;
  }

  .close-sidebar:hover {
    transform: rotate(90deg);
  }

  .sidebar-links {
    display: flex;
    flex-direction: column;
    gap: 30px;
  }

  .sidebar-link {
    font-size: 28px;
    font-weight: 800;
    text-decoration: none;
    color: #000;
    opacity: 0.3;
    transition: all 0.3s;
    letter-spacing: -0.5px;
  }

  .sidebar-link:hover, .sidebar-link.active {
    opacity: 1;
    transform: translateX(10px);
  }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 40px;
    border-top: 1px solid #f2f2f2;
  }

  .sidebar-footer p {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #bbb;
  }

  .nav-top-right {
    display: flex;
    align-items: center;
    gap: 25px;
  }

  .nav-top-right i {
    font-size: 24px;
    cursor: pointer;
    color: var(--black, #0F0F0F);
    transition: transform 0.3s;
  }

  .nav-top-right i:hover {
    transform: scale(1.1);
  }

  /* Search Overlay */
  .search-overlay-box {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 80px;
    background: #fff;
    z-index: 2100;
    display: flex;
    align-items: center;
    padding: 0 40px;
    transform: translateY(-100%);
    transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
  }

  .search-overlay-box.active {
    transform: translateY(0);
  }

  .search-overlay-box input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #000;
  }

  .search-overlay-box input::placeholder {
    text-transform: uppercase;
    color: #bbb;
  }

  .search-overlay-box .close-search-btn {
    font-size: 32px;
    cursor: pointer;
    margin-left: 20px;
  }

  /* Search Results Panel */
  .search-results-panel {
    position: fixed;
    top: 80px;
    left: 0;
    width: 100%;
    max-height: calc(100vh - 80px);
    background: #fff;
    z-index: 2099;
    overflow-y: auto;
    padding: 0;
    transform: translateY(-120%);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
  }

  .search-results-panel.active {
    transform: translateY(0);
    opacity: 1;
  }

  .search-results-inner {
    padding: 20px;
    max-width: 600px;
    margin: 0 auto;
  }

  .search-results-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #aaa;
    margin-bottom: 16px;
    padding: 0 4px;
  }

  .search-result-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px;
    border-radius: 16px;
    cursor: pointer;
    transition: background 0.2s ease;
    text-decoration: none;
    color: inherit;
  }

  .search-result-item:hover,
  .search-result-item.sr-active {
    background: #f5f5f0;
  }

  .search-result-img {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    object-fit: cover;
    background: #eee;
    flex-shrink: 0;
  }

  .search-result-info {
    flex: 1;
    min-width: 0;
  }

  .search-result-name {
    font-size: 15px;
    font-weight: 700;
    color: #0D0D0D;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .search-result-meta {
    font-size: 12px;
    color: #999;
    margin-top: 2px;
  }

  .search-result-price {
    font-size: 14px;
    font-weight: 800;
    color: #0D0D0D;
    white-space: nowrap;
  }

  .search-empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #aaa;
  }

  .search-empty-state i {
    font-size: 48px;
    display: block;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  .search-empty-state p {
    font-size: 14px;
    font-weight: 600;
  }

  .search-loading {
    text-align: center;
    padding: 30px;
    color: #bbb;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  /* Backdrop */
  .search-backdrop {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.3);
    z-index: 2050;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .search-backdrop.active {
    opacity: 1;
    pointer-events: all;
  }

  @media (max-width: 768px) {
    .navbar-top {
      padding: 0 20px;
    }

    .nav-top-logo {
      font-size: 20px;
    }

    .search-overlay-box {
      padding: 0 20px;
    }

    .search-results-inner {
      padding: 15px;
    }
  }
</style>

<!-- Top Navbar Shell -->
<nav class="navbar-top" id="mainHeader">
  <div class="nav-top-left">
    <i class="bx bx-menu nav-top-burger" id="globalBurger"></i>
    <a href="home.html" class="nav-top-logo">
      <img src="logo.png" alt="Monthrob" style="height: 28px; width: auto;">
    </a>
  </div>

  <div class="nav-top-right">
    <i class="bx bx-search" id="globalSearchBtn"></i>
  </div>
</nav>

<!-- Search Experience -->
<div class="search-overlay-box" id="globalSearchOverlay">
  <i class="bx bx-search" style="font-size: 22px; color: #bbb; margin-right: 15px;"></i>
  <input type="text" placeholder="Search products..." id="globalSearchInput" autocomplete="off">
  <i class="bx bx-x close-search-btn" id="globalCloseSearch"></i>
</div>

<!-- Search Results -->
<div class="search-results-panel" id="searchResultsPanel">
  <div class="search-results-inner" id="searchResultsInner"></div>
</div>

<!-- Backdrop -->
<div class="search-backdrop" id="searchBackdrop"></div>

<!-- PC Navigation Sidebar -->
<div class="pc-sidebar-overlay" id="pcSidebarOverlay"></div>
<div class="pc-sidebar" id="pcSidebar">
  <div class="sidebar-header">
    <a href="home.html" class="sidebar-logo">
      <img src="logo.png" alt="Monthrob" style="height: 32px; width: auto;">
    </a>
    <i class="bx bx-x close-sidebar" id="closeSidebar"></i>
  </div>
  <div class="sidebar-links">
    <a href="home.html" class="sidebar-link" id="side-home">Home</a>
    <a href="shop.html" class="sidebar-link" id="side-shop">Shop</a>
    <a href="collections.html" class="sidebar-link" id="side-collections">Collections</a>
    <a href="cart.html" class="sidebar-link" id="side-cart">Cart</a>
    <a href="profile.html" class="sidebar-link" id="side-profile">Profile</a>
  </div>
  <div class="sidebar-footer">
    <p>Premium Streetwear</p>
    <div style="margin-top: 10px; font-size: 14px; color: #000; font-weight: 800;">monthrob.in</div>
  </div>
</div>

<script>
  (function () {
    const header = document.getElementById('mainHeader');
    const searchBtn = document.getElementById('globalSearchBtn');
    const searchOverlay = document.getElementById('globalSearchOverlay');
    const closeSearch = document.getElementById('globalCloseSearch');
    const searchInput = document.getElementById('globalSearchInput');
    const resultsPanel = document.getElementById('searchResultsPanel');
    const resultsInner = document.getElementById('searchResultsInner');
    const backdrop = document.getElementById('searchBackdrop');
    const burger = document.getElementById('globalBurger');
    const backBtn = document.getElementById('globalBackBtn');
    const pcSidebar = document.getElementById('pcSidebar');
    const pcSidebarOverlay = document.getElementById('pcSidebarOverlay');
    const closeSidebar = document.getElementById('closeSidebar');

    let allProducts = null; // cached after first search
    let searchTimeout = null;
    let activeIndex = -1;


    // 1. Dynamic Scroll Threshold
    const thresholdAttr = document.getElementById('topNavContainer')?.getAttribute('data-threshold');
    const scrollThreshold = thresholdAttr ? parseInt(thresholdAttr) : 20;

    window.addEventListener('scroll', () => {
      if (window.scrollY > scrollThreshold) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    });

    // 2. Open Search
    function openSearch() {
      searchOverlay.classList.add('active');
      backdrop.classList.add('active');
      searchInput.focus();
      document.body.style.overflow = 'hidden';
    }

    // 3. Close Search
    function closeSearchFn() {
      searchOverlay.classList.remove('active');
      resultsPanel.classList.remove('active');
      backdrop.classList.remove('active');
      searchInput.value = '';
      resultsInner.innerHTML = '';
      activeIndex = -1;
      document.body.style.overflow = '';
    }

    if (searchBtn) searchBtn.addEventListener('click', openSearch);
    if (closeSearch) closeSearch.addEventListener('click', closeSearchFn);
    if (backdrop) backdrop.addEventListener('click', closeSearchFn);

    // Close on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && searchOverlay.classList.contains('active')) {
        closeSearchFn();
      }
    });

    // 4. Live Search Logic
    async function fetchProducts() {
      if (allProducts) return allProducts;
      if (typeof monthrob_DB !== 'undefined' && monthrob_DB.get) {
        allProducts = await monthrob_DB.get('products');
        return allProducts || [];
      }
      // Fallback: direct API call
      try {
        const apiBase = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
          ? 'http://localhost:5000/api'
          : '/api';

        const res = await fetch(`${apiBase}/products`);
        allProducts = await res.json();
        return allProducts || [];
      } catch (e) {
        console.error('Search: Failed to fetch products', e);
        return [];
      }
    }

    function getProductPageUrl(productId) {
      return 'product.html?id=' + productId;
    }

    function renderResults(products, query) {
      if (!query.trim()) {
        resultsPanel.classList.remove('active');
        return;
      }

      resultsPanel.classList.add('active');
      activeIndex = -1;

      if (products.length === 0) {
        resultsInner.innerHTML = `
          <div class="search-empty-state">
            <i class='bx bx-search-alt'></i>
            <p>No products found for "${query}"</p>
          </div>
        `;
        return;
      }

      const label = `<div class="search-results-label">${products.length} result${products.length > 1 ? 's' : ''} found</div>`;

      const items = products.map((p, i) => {
        const imgUrl = (p.media && p.media.length > 0) ? p.media[0].url : '';
        const imgTag = imgUrl
          ? `<img class="search-result-img" src="${imgUrl}" alt="${p.name}" onerror="this.style.background='#ddd'; this.src='';">`
          : `<div class="search-result-img" style="display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#bbb;">${p.name.charAt(0)}</div>`;

        return `
          <a href="${getProductPageUrl(p._id)}" class="search-result-item" data-index="${i}">
            ${imgTag}
            <div class="search-result-info">
              <div class="search-result-name">${highlightMatch(p.name, query)}</div>
              <div class="search-result-meta">${p.category || ''}</div>
            </div>
            <div class="search-result-price">Rs. ${p.sellingPrice}</div>
          </a>
        `;
      }).join('');

      resultsInner.innerHTML = label + items;
    }

    function highlightMatch(text, query) {
      if (!query) return text;
      const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return text.replace(regex, '<strong style="color:#E53935;">$1</strong>');
    }

    async function performSearch(query) {
      const q = query.trim().toLowerCase();

      if (!q) {
        resultsPanel.classList.remove('active');
        resultsInner.innerHTML = '';
        return;
      }

      // Show loading
      resultsPanel.classList.add('active');
      resultsInner.innerHTML = '<div class="search-loading">Searching...</div>';

      const products = await fetchProducts();
      const filtered = products.filter(p => {
        if (p.status && p.status !== 'Active') return false;
        const name = (p.name || '').toLowerCase();
        const category = (p.category || '').toLowerCase();
        const desc = (p.descriptionShort || '').toLowerCase();
        const descLong = (p.description || '').toLowerCase();
        const tags = (p.searchTags || []).map(t => t.toLowerCase());
        const tagMatch = tags.some(t => t.includes(q));
        return name.includes(q) || category.includes(q) || desc.includes(q) || descLong.includes(q) || tagMatch;
      }).slice(0, 10); // limit to 10 results

      renderResults(filtered, query.trim());
    }

    // Debounced input handler
    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        performSearch(e.target.value);
      }, 300);
    });

    // Enter key to go to first result
    searchInput.addEventListener('keydown', (e) => {
      const items = resultsInner.querySelectorAll('.search-result-item');

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIndex = Math.min(activeIndex + 1, items.length - 1);
        updateActiveItem(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIndex = Math.max(activeIndex - 1, -1);
        updateActiveItem(items);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeIndex >= 0 && items[activeIndex]) {
          items[activeIndex].click();
        } else if (items.length > 0) {
          items[0].click();
        }
      }
    });

    function updateActiveItem(items) {
      items.forEach(item => item.classList.remove('sr-active'));
      if (activeIndex >= 0 && items[activeIndex]) {
        items[activeIndex].classList.add('sr-active');
        items[activeIndex].scrollIntoView({ block: 'nearest' });
      }
    }

    // 5. Sidebar Logic
    const openSidebar = () => {
      if (pcSidebar && pcSidebarOverlay) {
        pcSidebar.classList.add('active');
        pcSidebarOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      }
    };

    const closeSidebarFn = () => {
      if (pcSidebar && pcSidebarOverlay) {
        pcSidebar.classList.remove('active');
        pcSidebarOverlay.classList.remove('active');
        document.body.style.overflow = '';
      }
    };

    if (burger) {
      burger.onclick = (e) => {
        e.preventDefault();
        openSidebar();
      };
    }
    if (closeSidebar) closeSidebar.onclick = closeSidebarFn;
    if (pcSidebarOverlay) pcSidebarOverlay.onclick = closeSidebarFn;

    // 6. Sidebar Link Activation
    const path = window.location.pathname.toLowerCase();
    const sideLinks = document.querySelectorAll('.sidebar-link');
    sideLinks.forEach(link => {
      if (path.includes(link.getAttribute('href'))) {
        link.classList.add('active');
      }
    });

    // 7. Page Specific Branding (Simplified)
    if (path.includes('product.html') || path.includes('cart.html') || path.includes('checkout.html')) {
      if (header) {
        header.style.background = 'rgba(255,255,255,0.95)';
        header.style.borderBottom = '1px solid #f2f2f2';
      }
    }
  })();
</script>
