<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>monthrob</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600&display=swap" rel="stylesheet">
    <style>  
        :root {
            --black: #0F0F0F;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Outfit", sans-serif;
            background-color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .loader-content {
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .loader-content.active {
            opacity: 1;
            transform: translateY(0);
        }

        .brand-name { text-transform: lowercase;   
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5em;
            ;
            color: var(--black);
            margin-bottom: 5px;
        }

        .tagline {
            font-size: 9px;
            letter-spacing: 0.8em;
            color: var(--black);
            opacity: 0.4;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .progress-line {
            width: 40px;
            height: 1px;
            background: rgba(0, 0, 0, 0.1);
            margin: 20px auto;
            position: relative;
            overflow: hidden;
        }

        .progress-inner {
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--black);
            animation: progressMove 2.5s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        @keyframes progressMove {
            to {
                left: 100%;
            }
        }

        body.fade-out {
            opacity: 0;
            transition: opacity 0.8s ease;
        }
    </style>
</head>

<body>

    <div class="loader-content" id="loader">
        <div class="brand-name"><span style="color: #E53935;">mon</span>throb</div>
        <div class="progress-line">
            <div class="progress-inner"></div>
        </div>
        <div class="tagline">monthrob.in</div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');

            // Minimal fade in
            setTimeout(() => {
                loader.classList.add('active');
            }, 100);

            // Fast redirect to home (0.3s)
            setTimeout(() => {
                document.body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = './home.html';
                }, 300);
            }, 300);
        });
    </script>
</body>

</html>
